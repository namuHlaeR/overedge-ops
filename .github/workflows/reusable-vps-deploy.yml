name: Reusable VPS Deploy

on:
  workflow_call:
    inputs:
      vps_compose_path:
        required: true
        type: string
      service:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      health_container:
        required: false
        type: string
        default: ""
      health_cmd:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ vars.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ inputs.vps_compose_path }}"
            export IMAGE_TAG="${{ inputs.image_tag }}"
            docker compose pull ${{ inputs.service }}
            docker compose up -d ${{ inputs.service }}
            sleep 10
            CONTAINER="${{ inputs.health_container }}"
            if [ -n "$CONTAINER" ]; then
              for i in $(seq 1 12); do
                if docker exec "$CONTAINER" ${{ inputs.health_cmd }} 2>/dev/null; then
                  echo "Health check passed"
                  exit 0
                fi
                echo "Waiting for health ($i/12)..."
                sleep 5
              done
              echo "Health check failed"
              exit 1
            fi
